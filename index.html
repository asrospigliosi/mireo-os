<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mireo® OS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 viewBox%3D%220 0 32 32%22%3E%3Crect width%3D%2232%22 height%3D%2232%22 rx%3D%227%22 fill%3D%22%231F4ED8%22%2F%3E%3Ctext x%3D%2213%22 y%3D%2223%22 font-family%3D%22-apple-system%2CSegoe UI%2CArial%2Csans-serif%22 font-weight%3D%22700%22 font-size%3D%2220%22 fill%3D%22%23fff%22 text-anchor%3D%22middle%22%3Em%3C%2Ftext%3E%3Ctext x%3D%2225%22 y%3D%2212%22 font-family%3D%22-apple-system%2CSegoe UI%2CArial%2Csans-serif%22 font-weight%3D%22600%22 font-size%3D%228%22 fill%3D%22%23fff%22 text-anchor%3D%22middle%22%3E%C2%AE%3C%2Ftext%3E%3C%2Fsvg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E7E5DF;
    --border-strong: #D6D3CA;
    --text: #1A1A1A;
    --text-secondary: #6B6A65;
    --text-muted: #9A9890;
    --accent: #1F4ED8;
    --accent-bg: #EAF0FE;
    --accent-text: #1E3FAE;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171715;
      --surface: #1F1F1C;
      --border: #33322E;
      --border-strong: #454339;
      --text: #F2F1EC;
      --text-secondary: #A9A79F;
      --text-muted: #77756C;
      --accent: #6E93F7;
      --accent-bg: #22304F;
      --accent-text: #AFC4FA;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 24px 80px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  .brand-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .brand-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  #search {
    width: 240px;
    max-width: 100%;
    padding: 9px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
  }
  #search:focus { outline: none; border-color: var(--accent); }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 8px;
  }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .chip:hover { border-color: var(--border-strong); }
  .chip.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }
  .chip i { font-size: 14px; margin-right: 5px; vertical-align: -2px; }

  .status-line { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; min-height: 16px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 9px;
    background: var(--accent-bg); color: var(--accent-text);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: contain; background: #FFFFFF; }
  .card-name { font-weight: 600; font-size: 15px; }

  .link-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .link-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 5px 10px;
    border-radius: 7px; border: 1px solid var(--border);
    color: var(--text-secondary); text-decoration: none;
  }
  .link-chip i { font-size: 14px; }
  .link-chip svg { vertical-align: -2px; }
  .link-chip:hover { border-color: var(--border-strong); background: var(--bg); }
  .link-chip.pending {
    color: var(--text-muted);
    border-style: dashed;
    cursor: default;
  }
  .link-chip.pending:hover { background: none; border-color: var(--border); }

  .empty-note { font-size: 12px; color: var(--text-muted); }

  .no-results { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }

  .access-section { margin-bottom: 22px; }
  .access-section-title {
    font-size: 13px; font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .access-section-title i { font-size: 15px; }
  .access-section-title svg { vertical-align: -2px; }
  .access-row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; padding: 8px 12px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border); margin-bottom: 6px;
    gap: 12px;
  }
  .access-row > span:first-child { flex-shrink: 0; }
  .access-row a {
    color: var(--accent-text); text-decoration: none;
    display: flex; align-items: center; gap: 4px; font-size: 12px;
    min-width: 0; max-width: 65%;
  }
  .access-row a .url-text {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  .access-row a:hover { text-decoration: underline; }
  .access-row a i { font-size: 13px; flex-shrink: 0; }
  .access-empty { color: var(--text-muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-title">mireo® OS</div>
    </div>
    <input id="search" type="search" placeholder="Buscar marca...">
  </header>

  <div class="filter-label">Tipo de acceso</div>
  <div class="chip-row" id="type-filters"></div>

  <div style="display:flex; align-items:flex-start; gap:20px; margin-bottom:20px; flex-wrap:wrap;">
    <div style="flex:1; min-width:200px;">
      <div class="filter-label">Marca</div>
      <div class="chip-row" id="brand-filters" style="margin-bottom:0;"></div>
    </div>
    <div style="border-left:1px solid var(--border); padding-left:20px;">
      <div class="filter-label">Grupo</div>
      <div class="chip-row" id="group-filters" style="margin-bottom:0;"></div>
    </div>
  </div>

  <div class="status-line" id="status-line"></div>

  <div id="recents-block" style="display:none; margin-bottom:20px;">
    <div class="filter-label">Recientes</div>
    <div class="chip-row" id="recents-row"></div>
  </div>

  <div class="grid" id="grid"></div>
  <div id="access-view" style="display:none;"></div>
  <div class="no-results" id="no-results" style="display:none;">No hay marcas que coincidan.</div>

</div>

function resolveIconKey(label) {
  // Soporta labels compuestos como "Meta Ads Miraflores" (marca + sede),
  // que deben usar el mismo ícono/color que "Meta Ads".
  if (MULTICOLOR_SVGS[label] || BRAND_SVGS[label] || LINK_ICONS[label]) return label;
  const allKeys = [...Object.keys(MULTICOLOR_SVGS), ...Object.keys(BRAND_SVGS), ...Object.keys(LINK_ICONS)];
  const base = allKeys.find(k => label.startsWith(k + " "));
  return base || label;
}

function iconMarkup(label) {
  const key = resolveIconKey(label);
  if (MULTICOLOR_SVGS[key]) {
    const m = MULTICOLOR_SVGS[key];
    return `<svg viewBox="${m.viewBox}" width="14" height="14" style="flex-shrink:0;">${m.body}</svg>`;
  }
  if (BRAND_SVGS[key]) {
    const color = BRAND_COLORS[key] || "currentColor";
    return `<svg viewBox="0 0 24 24" width="14" height="14" style="fill:${color};flex-shrink:0;"><path d="${BRAND_SVGS[key]}"/></svg>`;
  }
  return LINK_ICONS[key] ? `<i class="ti ${LINK_ICONS[key]}"></i>` : "";
}

let activeType = "all";
let activeBrand = "all";
let activeGroup = null;
let viewMode = "cards"; // "cards" | "access"
let searchTerm = "";

function initials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function shortUrl(url) {
  return url.replace(/^https?:\/\//, "").replace(/\/$/, "");
}

function renderFilters() {
  const typeRow = document.getElementById("type-filters");
  typeRow.innerHTML = "";
  TYPES.forEach(t => {
    const chip = document.createElement("div");
    chip.className = "chip" + (activeType === t.key ? " active" : "");
    chip.innerHTML = `<i class="ti ${t.icon}"></i>${t.label}`;
    chip.onclick = () => { activeType = t.key; render(); };
    typeRow.appendChild(chip);
  });

  const accessChip = document.createElement("div");
  accessChip.className = "chip" + (viewMode === "access" ? " active" : "");
  accessChip.innerHTML = `<i class="ti ti-list-details"></i>Por acceso`;
  accessChip.onclick = () => { viewMode = (viewMode === "access" ? "cards" : "access"); render(); };
  typeRow.appendChild(accessChip);

  const brandRow = document.getElementById("brand-filters");
  brandRow.innerHTML = "";
  const allChip = document.createElement("div");
  allChip.className = "chip" + (viewMode === "cards" && activeBrand === "all" && !activeGroup ? " active" : "");
  allChip.textContent = "Todas";
  allChip.onclick = () => { viewMode = "cards"; activeBrand = "all"; activeGroup = null; render(); };
  brandRow.appendChild(allChip);
  BRANDS.forEach(b => {
    const chip = document.createElement("div");
    chip.className = "chip" + (viewMode === "cards" && !activeGroup && activeBrand === b.name ? " active" : "");
    chip.textContent = b.name;
    chip.onclick = () => { viewMode = "cards"; activeBrand = b.name; activeGroup = null; render(); };
    brandRow.appendChild(chip);
  });

  const groupRow = document.getElementById("group-filters");
  groupRow.innerHTML = "";
  GROUPS.forEach(g => {
    const chip = document.createElement("div");
    chip.className = "chip" + (viewMode === "cards" && activeGroup === g.key ? " active" : "");
    chip.textContent = g.label;
    chip.onclick = () => { viewMode = "cards"; activeGroup = g.key; activeBrand = "all"; render(); };
    groupRow.appendChild(chip);
  });
}

/* Chips que muestran solo el ícono (sin texto) en la vista de tarjetas,
   para no saturar. Seguimiento, Plan de medios y Reporte general mantienen
   el texto porque a futuro podría haber más de un documento de la misma
   plataforma (ej. dos hojas de seguimiento) y el nombre ayuda a distinguirlos. */
const ICON_ONLY_LABELS = ["Web", "Meta Ads", "Google Ads", "TikTok Ads", "Analytics", "Shopify", "Mailchimp", "Drive"];

function linkChip(label, url, brandName, opts = {}) {
  const icon = iconMarkup(label);
  const displayText = opts.displayText !== undefined ? opts.displayText : label;
  const iconOnly = opts.iconOnly !== undefined ? opts.iconOnly : ICON_ONLY_LABELS.includes(label);
  const text = iconOnly ? "" : displayText;
  const titleAttr = iconOnly ? ` title="${displayText}"` : "";
  if (url) {
    return `<a class="link-chip track-link" href="${url}" target="_blank" rel="noopener" data-brand="${brandName}" data-label="${label}"${titleAttr}>${icon}${text}</a>`;
  }
  return `<span class="link-chip pending"${titleAttr}>${icon}${text}</span>`;
}

function buildLinksForType(brand, type) {
  const chips = [];
  const wantAll = type === "all";

  if (wantAll || type === "web") {
    chips.push(linkChip("Web", brand.web, brand.name));
  }
  if (wantAll || type === "ads") {
    if (brand.ads.meta && typeof brand.ads.meta === "object") {
      Object.entries(brand.ads.meta).forEach(([sede, url]) => {
        chips.push(linkChip(`Meta Ads ${sede}`, url, brand.name, { displayText: sede, iconOnly: false }));
      });
    } else {
      chips.push(linkChip("Meta Ads", brand.ads.meta, brand.name));
    }
    if (brand.ads.google !== undefined) chips.push(linkChip("Google Ads", brand.ads.google, brand.name));
    if (brand.ads.tiktok !== undefined) chips.push(linkChip("TikTok Ads", brand.ads.tiktok, brand.name));
  }
  if (wantAll || type === "docs" || type === "accesos") {
    if (brand.analytics !== undefined) {
      chips.push(linkChip("Analytics", brand.analytics, brand.name));
    }
  }
  if (wantAll || type === "accesos") {
    if (brand.accesos) {
      chips.push(linkChip("Shopify", brand.accesos.shopify, brand.name));
      if (brand.accesos.mailchimp !== undefined) chips.push(linkChip("Mailchimp", brand.accesos.mailchimp, brand.name));
    }
  }
  if (wantAll || type === "drive") {
    if (brand.drive !== undefined) {
      chips.push(linkChip("Drive", brand.drive, brand.name));
    }
  }
  if (wantAll || type === "docs") {
    if (brand.docs) {
      chips.push(linkChip("Reporte general", brand.docs.general, brand.name));
      chips.push(linkChip("Plan de medios", brand.docs.plan, brand.name));
      chips.push(linkChip("Seguimiento", brand.docs.seguimiento, brand.name));
    }
  }
  return chips.join("");
}

function getSubItemsForType(typeKey) {
  switch (typeKey) {
    case "web":
      return [{ label: "Web", get: b => b.web }];
    case "ads": {
      const items = [
        { label: "Meta Ads", get: b => b.ads.meta },
        { label: "Google Ads", get: b => b.ads.google },
      ];
      if (BRANDS.some(b => b.ads.tiktok !== undefined)) {
        items.push({ label: "TikTok Ads", get: b => b.ads.tiktok, applicable: b => b.ads.tiktok !== undefined });
      }
      return items;
    }
    case "docs":
      return [
        { label: "Seguimiento", get: b => b.docs.seguimiento, applicable: b => !!b.docs },
        { label: "Plan de medios", get: b => b.docs.plan, applicable: b => !!b.docs },
        { label: "Reporte general", get: b => b.docs.general, applicable: b => !!b.docs },
        { label: "Analytics", get: b => b.analytics, applicable: b => b.analytics !== undefined },
      ];
    case "accesos": {
      const items = [
        { label: "Analytics", get: b => b.analytics, applicable: b => b.analytics !== undefined },
        { label: "Shopify", get: b => b.accesos.shopify, applicable: b => !!b.accesos },
      ];
      if (BRANDS.some(b => b.accesos && b.accesos.mailchimp !== undefined)) {
        items.push({ label: "Mailchimp", get: b => b.accesos.mailchimp, applicable: b => !!b.accesos && b.accesos.mailchimp !== undefined });
      }
      return items;
    }
    case "drive":
      return [{ label: "Drive", get: b => b.drive, applicable: b => b.drive !== undefined }];
    default:
      return [];
  }
}

function renderAccessView(container) {
  container.innerHTML = "";
  const typesToShow = activeType === "all" ? TYPES.filter(t => t.key !== "all") : TYPES.filter(t => t.key === activeType);
  let hasContent = false;

  typesToShow.forEach(t => {
    getSubItemsForType(t.key).forEach(item => {
      const brandsForItem = BRANDS.filter(b =>
        (!item.applicable || item.applicable(b)) &&
        b.name.toLowerCase().includes(searchTerm.toLowerCase())
      );
      if (!brandsForItem.length) return;

      // Si el valor es un objeto (ej. Meta Ads con varias sedes), se
      // expande en una fila por sede: "Marca · Sede".
      const rows = [];
      brandsForItem.forEach(b => {
        const val = item.get(b);
        if (val && typeof val === "object") {
          Object.entries(val).forEach(([sede, url]) => {
            rows.push({ label: `${b.name} · ${sede}`, brandName: b.name, url });
          });
        } else {
          rows.push({ label: b.name, brandName: b.name, url: val });
        }
      });
      if (!rows.length) return;
      hasContent = true;

      const section = document.createElement("div");
      section.className = "access-section";
      const icon = iconMarkup(item.label);
      const rowsHtml = rows.map(r => {
        const right = r.url
          ? `<a class="track-link" href="${r.url}" target="_blank" rel="noopener" data-brand="${r.brandName}" data-label="${item.label}" title="${r.url}"><span class="url-text">${shortUrl(r.url)}</span><i class="ti ti-external-link"></i></a>`
          : `<span class="access-empty">—</span>`;
        return `<div class="access-row"><span>${r.label}</span>${right}</div>`;
      }).join("");

      section.innerHTML = `<div class="access-section-title">${icon}${item.label}</div>${rowsHtml}`;
      container.appendChild(section);
    });
  });

  return hasContent;
}

function render() {
  renderFilters();

  const grid = document.getElementById("grid");
  const accessView = document.getElementById("access-view");
  const noResults = document.getElementById("no-results");
  const statusLine = document.getElementById("status-line");

  if (viewMode === "access") {
    grid.style.display = "none";
    accessView.style.display = "block";
    grid.innerHTML = "";
    const hasContent = renderAccessView(accessView);
    noResults.style.display = hasContent ? "none" : "block";
    statusLine.textContent = activeType !== "all"
      ? `Vista por acceso · tipo "${TYPES.find(t => t.key === activeType).label}"`
      : "Vista por acceso · todos los tipos";
    return;
  }

  accessView.style.display = "none";
  accessView.innerHTML = "";
  grid.style.display = "grid";

  let visible = BRANDS.filter(b => {
    const matchesBrand = activeGroup ? b.group === activeGroup : (activeBrand === "all" || b.name === activeBrand);
    const matchesSearch = b.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchesBrand && matchesSearch;
  });

  const parts = [];
  if (activeType !== "all") parts.push(`tipo "${TYPES.find(t => t.key === activeType).label}"`);
  if (activeGroup) parts.push(`grupo "${activeGroup}"`);
  else if (activeBrand !== "all") parts.push(`marca "${activeBrand}"`);
  statusLine.textContent = parts.length ? `Filtrando por ${parts.join(" + ")}` : "";

  grid.innerHTML = "";
  noResults.style.display = visible.length ? "none" : "block";

  visible.forEach(b => {
    const card = document.createElement("div");
    card.className = "card";
    const avatarInner = b.logo ? `<img src="${b.logo}" alt="${b.name}" onerror="this.parentElement.textContent='${initials(b.name)}';">` : initials(b.name);
    card.innerHTML = `
      <div class="card-head">
        <div class="avatar">${avatarInner}</div>
        <div class="card-name">${b.name}</div>
      </div>
      <div class="link-list">${buildLinksForType(b, activeType)}</div>
    `;
    grid.appendChild(card);
  });
}

const RECENTS_KEY = "mireoRecentLinks";

function getRecents() {
  try { return JSON.parse(localStorage.getItem(RECENTS_KEY)) || []; }
  catch (e) { return []; }
}

function recordRecent(brand, label, url) {
  if (!brand || !label || !url) return;
  let list = getRecents().filter(r => r.url !== url);
  list.unshift({ brand, label, url });
  list = list.slice(0, 4);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(list));
  renderRecents();
}

function renderRecents() {
  const block = document.getElementById("recents-block");
  const row = document.getElementById("recents-row");
  const list = getRecents();
  if (!list.length) { block.style.display = "none"; return; }
  block.style.display = "block";
  row.innerHTML = list.map(r => {
    const icon = iconMarkup(r.label);
    return `<a class="link-chip track-link" href="${r.url}" target="_blank" rel="noopener" data-brand="${r.brand}" data-label="${r.label}">${icon}${r.brand} · ${r.label}</a>`;
  }).join("");
}

document.addEventListener("click", (e) => {
  const a = e.target.closest("a.track-link");
  if (a) recordRecent(a.dataset.brand, a.dataset.label, a.getAttribute("href"));
});

document.getElementById("search").addEventListener("input", (e) => {
  searchTerm = e.target.value;
  render();
});

render();
renderRecents();
</script>
